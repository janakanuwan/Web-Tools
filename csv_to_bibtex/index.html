<h1>Spreadsheet (CSV/Excel) to BibTeX Converter</h1>

<div class="controls">
    <label for="fileInput" class="custom-file-upload">Upload CSV or Excel File</label>
    <input type="file" id="fileInput" accept=".csv, .xlsx, .xls">
    <button onclick="downloadBibtex()">Download .bib File</button>
    <pre id="output"></pre>
</div>

<script>
    function sanitizeBibtexKey(title, year) {
        return title.toLowerCase().replace(/\W+/g, '').slice(0, 30) + year;
    }

    function escapeBibtex(value) {
        if (!value) return '';
        return value.toString().replace(/{/g, '\\{').replace(/}/g, '\\}').replace(/&/g, '\\&');
    }

    function preserveCapitalization(text) {
        if (!text) return '';
        // Escape standard BibTeX characters first
        const escapedText = escapeBibtex(text);

        // Wrap words containing uppercase letters in braces
        return escapedText.split(/\s+/).map(word => {
            // If the word contains at least one uppercase letter (A-Z)
            if (/[A-Z]/.test(word)) {
                return `{${word}}`;
            }
            return word;
        }).join(' ');
    }

    function formatPages(row) {
        // Wrap the values in String() to handle numbers from Excel files safely
        const pages = row['Pages'] ? String(row['Pages']) : '';
        const start = row['Start Page'] ? String(row['Start Page']) : pages.split('-')[0];
        const end = row['End Page'] ? String(row['End Page']) : (pages.includes('-') ? pages.split('-')[1] : null);

        if (start && end) return `${start}--${end}`;
        if (start) return start;
        return '';
    }

    function mapRowToBibtex(row) {
        let entryType = 'article';
        // Use "Item Type" if available
        const itemType = (row['Item Type'] || '').toLowerCase().trim();

        if (itemType === 'book') {
            entryType = 'book';
        } else if (['conference paper', 'conferencepaper'].includes(itemType)) {
            entryType = 'inproceedings';
        } else if (row['Meeting Name'] && row['Meeting Name'].trim()) { // Fallbacks if "Item Type" is not usable
            entryType = 'inproceedings';
        } else if (row['Publication Title'] && row['Publication Title'].trim()) {
            entryType = 'article';
        }

        const titleRaw = row['Document Title'] || row['Title'] || 'Untitled';
        const booktitleRaw = row['Conference Name'] || row['Meeting Name'] || '';
        const year = row['Publication Year'] || row['Year'] || '????';
        const key = row['Key'] || sanitizeBibtexKey(titleRaw, year);

        // Map and escape fields immediately.
        // Apply preserveCapitalization specifically to titles.
        const fields = {
            author: escapeBibtex(row['Authors'] || row['Author']),
            title: preserveCapitalization(titleRaw),
            journal: escapeBibtex(row['Publication Title']),
            booktitle: preserveCapitalization(booktitleRaw),
            year: escapeBibtex(year),
            volume: escapeBibtex(row['Volume']),
            number: escapeBibtex(row['Issue']),
            pages: escapeBibtex(formatPages(row)),
            doi: escapeBibtex(row['DOI']),
            url: escapeBibtex(row['PDF Link'] || row['Url'] || row['URL']),
            abstract: escapeBibtex(row['Abstract'] || row['Abstract Note']),
            publisher: escapeBibtex(row['Publisher']),
            isbn: escapeBibtex(row['ISBNs'] || row['ISBN']),
            issn: escapeBibtex(row['ISSN']),
            keywords: escapeBibtex(row['Author Keywords'] || row['Manual Tags']),
            series: escapeBibtex(row['Series']),
            note: escapeBibtex(row['Extra']),
        };

        // Remove empty fields and format.
        const cleaned = Object.entries(fields)
            .filter(([k, v]) => v && v.trim())
            .map(([k, v]) => `  ${k} = {${v}},`)
            .join('\n');

        return `@${entryType}{${key},\n${cleaned}\n}`;
    }

    let bibtexEntries = [];
    let originalFileName = "references.bib";

    // event listener to handle Excel and CSV via SheetJS
    document.getElementById('fileInput').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (!file) return;

        // Set output filename based on input
        originalFileName = file.name.replace(/\.[^/.]+$/, "") + '.bib';

        const reader = new FileReader();
        reader.onload = function (event) {
            // Read data as ArrayBuffer for SheetJS
            const data = new Uint8Array(event.target.result);

            // Parse workbook
            const workbook = XLSX.read(data, {type: 'array'});

            // Get first worksheet
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];

            // Convert worksheet to JSON array (automatically handles CSV rules & Excel formats)
            const rows = XLSX.utils.sheet_to_json(worksheet, {defval: ""});

            bibtexEntries = rows.map(mapRowToBibtex);
            document.getElementById('output').textContent = bibtexEntries.join('\n\n');
        };

        // Use readAsArrayBuffer to support binary Excel files
        reader.readAsArrayBuffer(file);
    });

    function downloadBibtex() {
        if (!bibtexEntries.length) {
            alert("No BibTeX data to export!");
            return;
        }
        const blob = new Blob([bibtexEntries.join('\n\n')], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = originalFileName || 'references.bib';
        a.click();
        URL.revokeObjectURL(url);
    }
</script>
